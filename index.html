<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!--tailwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google-font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font-AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#E4E4E7] pt-15 h-[900px] shadow-2xl">
    <div class=" max-w-[520px] bg-white  mx-auto p-10 rounded-lg h-[780px]">
        <div class="logo pt-2 text-center">
            <img class="w-[80px] mx-auto" src="./assets/github-logo.png" alt="">
            <h2 class="text-2xl text-[#1F2937] font-semibold pt-5">GitHub Issues Tracker</h2>
            <p class="pt-1 text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <!-- form -->
        <div class="form">
            <div class="card bg-base-100 w-full max-w-sm mx-auto space-y-3">
                <div class="card-body">
                    <fieldset class="fieldset w-full">

                        <label class="label text-[#1F2937] font-bold">Username</label>
                        <input id="user-name" type="text" class="input w-full" placeholder="Enter Username" />
                        <p class="text-[#4A00FF]">Default: admin</p>

                        <label class="label text-[#1F2937] font-bold">Password</label>
                        <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                        <p class="text-[#4A00FF]">Default: admin123</p>

                        <button id="signin-btn" class="btn btn-primary w-full mt-4 font-semibold">Sign In</button>

                    </fieldset>
                </div>
            </div>
            <!-- hr -->
            <div class="divider">
                <hr>
                <span>OR</span>
            </div>
            <!-- end-section -->
            <div class="text-center pt-3">
                <p class="pb-2">Demo Credentials:</p>
                <div class="bg-[#F8FAFC] p-10 rounded-lg">
                    <p class="font-semibold">Username: admin</p>
                    <p class="font-semibold">Password: admin123</p>
                </div>
            </div>
        </div>

    </div>

    <script src="./style/login.js"></script>
</body>

</html>
