<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!--tailwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google-font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font-AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
        .container{
            max-width:85rem;
        }
    </style>

<body>

    <header class="shadow-sm">
        <div class="flex justify-between items-center w-11/12 mx-auto p-5 ">
            <div class="logo flex items-center gap-3">
                <img class="w-[40px]" src="./assets/github-logo.png" alt="">
                <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary">+ New Issue</button>
            </div>
        </div>
        </div>
    </header> <hr class="border-gray-200">
    
<!-- nain section -->

    <main class=" pt-5 bg-[#F8FAFC]  ">
       

        <!-- count Issue -->
         <div class="container mx-auto">
            <div class="buttons flex gap-2 p-5 bg-white rounded-lg mb-3">

                <button id="all-btn" class="btn px-10">All</button>
                <button id="open-btn" class="btn px-10">Open</button>
                <button id="closed-btn" class="btn px-10">Closed</button>

            </div>

             <div class="p-5  flex justify-between items-center rounded-lg bg-white ">
            <div class="flex gap-4 ">
                <img class="" src="./assets/Group 1.png" alt="" srcset="">
                <div class="">
                     <span id="issue-count" class="text-xl font-semibold">Issues</span>
                    <p>Track and manage your project issues</p>
                </div>
            </div>

        <div class="flex justify-between gap-3 items-center">
            <p class=""><i class="fa-solid fa-circle text-[#00A96E]"></i><span class="">Open</span></p>
            <p class=""><i class="fa-solid fa-circle text-[#A855F7]"></i><span class="">Closed</span></p>
            </div>

        </div>
        <section id="spinner" class="flex justify-center items-center py-10 hidden">
            <span class="loading loading-bars loading-xl"></span>
        </section>
        
        <!-- ishues -->
        <div class=" pt-5">
            <div id="all-Issue" class="grid grid-cols-4 sm:2 gap-3">
            </div>
         </div>
         <!-- modal  -->
          <section>
    <div id="all-Issue" class="grid gap-4"></div>

<!-- Modal -->
<div id="allIssue" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-6">
  </div>

<section>
    <div id="myModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-2xl rounded-xl shadow-2xl p-8 relative ">
        
        <h2 id="modal-title" class="text-3xl font-bold text-slate-800 mb-2 leading-tight"></h2>

        <div class="flex items-center gap-3 mb-6 text-sm text-slate-500">
            <span id="modal-status-badge" class="px-3 py-1 rounded-full font-medium text-white"></span>
            <span>Opened by <strong id="modal-author" class="text-slate-700"></strong></span>
        </div>

        <div id="modal-labels-container" class="flex flex-wrap gap-3 mb-8"></div>

        <p id="modal-description" class="text-slate-600 leading-relaxed mb-10 text-lg"></p>

        <div class="bg-slate-50 rounded-xl p-6 flex justify-between items-center border border-slate-100">
            <div>
                <p class="text-slate-400 text-sm mb-1 font-medium">Assignee:</p>
                <p id="modal-assignee" class="text-slate-800 font-bold text-lg"></p>
            </div>
            <div class="text-right">
                <p class="text-slate-400 text-sm mb-1 font-medium">Priority:</p>
                <span id="modal-priority" class="px-4 py-1.5 rounded-lg font-bold text-sm uppercase"></span>
            </div>
        </div>

        <div class="mt-8 flex justify-end">
            <button onclick="closeModal()" class="bg-[#4F46E5] cursor-pointer hover:bg-indigo-700 text-white px-8 py-3 rounded-lg font-bold transition-all shadow-lg active:scale-95 text-lg">
                Close
            </button>
        </div>
    </div>
</div>
</section>

    </main>
    <script src="./style/script.js"></script>
</body>
</head>
